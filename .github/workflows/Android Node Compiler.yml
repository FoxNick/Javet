name: Build Node.js Static Library

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_javet_lib:
    strategy:
      matrix:
        include:
          - android_arch: arm
            android_abi: armeabi-v7a
            i18n_name: non-i18n
            cmake_flag:
            config_patch:
          - android_arch: x86
            android_abi: x86
            i18n_name: non-i18n
            cmake_flag:
            config_patch:
          - android_arch: arm64
            android_abi: arm64-v8a
            i18n_name: i18n
            cmake_flag: -DENABLE_I18N=1
            config_patch: sed -i 's/--with-intl=none/--with-intl=full-icu/g' android_configure.py
          - android_arch: x86_64
            android_abi: x86_64
            i18n_name: i18n
            cmake_flag: -DENABLE_I18N=1
            config_patch: sed -i 's/--with-intl=none/--with-intl=full-icu/g' android_configure.py

    runs-on: ubuntu-latest
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4

    - name: Setup Ubuntu dependencies
      run: |
        sudo apt-get install -y \
          execstack \
          gcc-multilib \
          g++-multilib \
          ninja-build

    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Configure Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27
        local-cache: false

    - name: Prepare build environment
      run: |
        echo "${{ env.ROOT }}/google/depot_tools" >> $GITHUB_PATH
        export NODE_VERSION=${{ env.JAVET_NODE_VERSION }}
        export CONFIG_FLAGS="--enable-static --disable-shared"
        export CMAKE_BUILD_TYPE="Static"

    - name: Clone Node.js repository
      run: |
        git clone https://github.com/nodejs/node.git
        cd node
        git checkout v${{ env.NODE_VERSION }}

    - name: Apply patches
      run: |
        git apply < ../Javet/scripts/patches/android/node/android_configure.py.patch
        git apply < ../Javet/scripts/patches/android/node/common.gypi.patch
        git apply < ../Javet/scripts/patches/android/node/configure.py.patch
        git apply < ../Javet/scripts/patches/android/node/constants-arm.h.patch
        git apply < ../Javet/scripts/patches/android/node/push_registers_asm.cc.patch
        git apply < ../Javet/scripts/patches/android/node/trap-handler.h.patch
        git apply < ../Javet/scripts/patches/android/node/test_crypto_clienthello.cc.patch

    - name: Modify build configuration
      run: |
        sed -i 's/enable_shared=1/enable_shared=0/g' android_configure.py
        sed -i 's/enable_static=0/enable_static=1/g' android_configure.py
        echo "export CONFIG_FLAGS=\"$CONFIG_FLAGS\"" >> android_configure.py

    - name: Build static library
      run: |
        mkdir -p out/build
        cd out/build
        cmake .. -DCMAKE_BUILD_TYPE=Static -GNinja \
          -DCMAKE_INSTALL_PREFIX=./install \
          -DANDROID_ABI=${{ matrix.android_abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          ${matrix.config_patch}
        ninja -j$(nproc)
        ninja install

    - name: Extract headers
      run: |
        mkdir -p node_headers/include/node
        cp -r node/src node_headers/include/node/
        cp -r node/deps node_headers/include/node/
        find node_headers/include/node -name ".gitignore" -delete

    - name: Package artifacts
      run: |
        mkdir -p node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}
        cp out/build/install/lib/libnode.a node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}/
        cp -r node_headers node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}/include

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}
        path: |
          node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}/*.a
          node-${{ matrix.android_arch }}-${{ matrix.i18n_name }}/include
